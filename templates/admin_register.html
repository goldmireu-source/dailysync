{% extends "base.html" %}
{% block title %}회원가입 · DAILY SYNC{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
  <div class="brand" style="margin-bottom: 0.5rem;">DAILY <span class="accent">SYNC</span></div>
  <h1 class="page-title" style="font-size: 20px; margin: 0.5rem 0 2rem;">회원가입</h1>

  {% if error %}
  <div style="background: #f4d4d0; color: #c44; border-radius: 8px; padding: 10px 14px; margin-bottom: 1.25rem; font-size: 13px; border: 1px solid #e8b4b0;">
    {{ error }}
  </div>
  {% endif %}

  <form method="POST" id="register-form" style="display: flex; flex-direction: column; gap: 1.1rem;">
    <div>
      <label style="display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; letter-spacing: 0.04em;">아이디</label>
      <input type="text" name="username" id="username-input" maxlength="14" required autocomplete="username"
             style="width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-card); color: var(--text); font-family: inherit; font-size: 14px; box-sizing: border-box; outline: none;"
             onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
      <div style="font-size: 11px; color: var(--text-faint); margin-top: 4px;">
        <span id="username-count">0</span>/14자
      </div>
    </div>

    <div>
      <label style="display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; letter-spacing: 0.04em;">비밀번호</label>
      <input type="password" name="password" id="password-input" maxlength="10" required autocomplete="new-password"
             style="width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-card); color: var(--text); font-family: inherit; font-size: 14px; box-sizing: border-box; outline: none;"
             onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
      <div style="font-size: 11px; color: var(--text-faint); margin-top: 4px;">
        <span id="password-count">0</span>/10자
      </div>
    </div>
    <div>
      <label style="display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; letter-spacing: 0.04em;">비밀번호 확인</label>
      <input type="password" name="password_confirm" id="password-confirm-input" maxlength="10" required autocomplete="new-password"
             style="width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-card); color: var(--text); font-family: inherit; font-size: 14px; box-sizing: border-box; outline: none;"
             onfocus="this.style.borderColor='var(--accent)'" onblur="checkConfirm()">
      <div id="confirm-status" style="font-size: 11px; margin-top: 4px; color: var(--text-faint);">비밀번호를 다시 입력해주세요</div>
    </div>

    <div>
      <label style="display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 6px; font-weight: 600; letter-spacing: 0.04em;">이름</label>
      <input type="text" name="display_name" id="name-input" required
             style="width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-card); color: var(--text); font-family: inherit; font-size: 14px; box-sizing: border-box; outline: none;"
             onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
      <div style="font-size: 11px; color: var(--text-faint); margin-top: 4px;">
        <span id="name-count">0</span>/<span id="name-limit">14</span>자
        <span style="margin-left: 6px; color: var(--text-faint);">· 한글 포함 시 최대 4자, 영문만 최대 14자</span>
      </div>
    </div>

    <button type="submit" id="submit-btn" disabled
            style="background: var(--accent); color: var(--bg-card); border: none; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 4px; letter-spacing: 0.02em; opacity: 0.4; transition: opacity .15s;">
      가입하기
    </button>
  </form>

  <div style="text-align: center; margin-top: 1.5rem; font-size: 13px; color: var(--text-dim);">
    이미 계정이 있으신가요?
    <a href="{{ url_for('web.admin_login') }}" style="color: var(--accent); text-decoration: none; font-weight: 600;">로그인</a>
  </div>
</div>

<script>
const usernameInput = document.getElementById('username-input');
const passwordInput = document.getElementById('password-input');
const confirmInput  = document.getElementById('password-confirm-input');
const nameInput     = document.getElementById('name-input');
const usernameCount = document.getElementById('username-count');
const passwordCount = document.getElementById('password-count');
const nameCount     = document.getElementById('name-count');
const nameLimitEl   = document.getElementById('name-limit');
const confirmStatus = document.getElementById('confirm-status');
const submitBtn     = document.getElementById('submit-btn');

const KOREAN_RE = /[가-힣ㄱ-ㅎㅏ-ㅣ]/;

function checkConfirm() {
  const pw  = passwordInput.value;
  const cpw = confirmInput.value;
  if (!cpw) {
    confirmStatus.textContent = '비밀번호를 다시 입력해주세요';
    confirmStatus.style.color = 'var(--text-faint)';
    confirmInput.style.borderColor = 'var(--border)';
    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.4';
    return;
  }
  if (pw === cpw) {
    confirmStatus.textContent = '✓ 일치';
    confirmStatus.style.color = 'var(--success)';
    confirmInput.style.borderColor = 'var(--success)';
    submitBtn.disabled = false;
    submitBtn.style.opacity = '1';
  } else {
    confirmStatus.textContent = '✗ 불일치';
    confirmStatus.style.color = 'var(--danger)';
    confirmInput.style.borderColor = 'var(--danger)';
    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.4';
  }
}

usernameInput.addEventListener('input', function () {
  usernameCount.textContent = this.value.length;
});

passwordInput.addEventListener('input', function () {
  passwordCount.textContent = this.value.length;
  if (confirmInput.value) checkConfirm();
});

confirmInput.addEventListener('input', checkConfirm);

nameInput.addEventListener('input', function () {
  const hasKorean = KOREAN_RE.test(this.value);
  const limit = hasKorean ? 4 : 14;
  if (this.value.length > limit) {
    this.value = this.value.slice(0, limit);
  }
  nameCount.textContent = this.value.length;
  nameLimitEl.textContent = limit;
});
</script>
{% endblock %}
