<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DAILY SYNC{% endblock %}</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Syne:wght@700;800&family=Outfit:wght@600;700;800&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    /* 컨테이너 폭 인라인 강제 — 외부 CSS 충돌 방지 */
    html { overflow-y: scroll; }
    body { margin: 0; padding: 0; }
    .ds-container {
      width: 100% !important;
      max-width: 1380px !important;
      margin-left: auto !important;
      margin-right: auto !important;
      padding: 2rem 1.5rem 5rem !important;
      box-sizing: border-box !important;
    }
  </style>
</head>
<body>
  <div class="ds-container">
    {% block content %}{% endblock %}
    <footer>
      DAILY SYNC · 본인 전용 다이제스트 · {{ now_year }}
      · <a href="{{ url_for('web.admin') }}">admin</a>
    </footer>
  </div>
  <script>
    // .back-link 클릭 시 history.back() — 이전 페이지(페이지 번호 포함)로 복귀.
    // 히스토리가 없을 때만 href fallback 사용.
    document.querySelectorAll('a.back-link').forEach(function(a) {
      a.addEventListener('click', function(e) {
        if (history.length > 1) {
          e.preventDefault();
          history.back();
        }
      });
    });
  </script>
</body>
</html>
