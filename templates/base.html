<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DAILY SYNC{% endblock %}</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Syne:wght@700;800&family=Outfit:wght@600;700;800&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    /* 컨테이너 폭 인라인 강제 — 외부 CSS 충돌 방지 */
    html { overflow-y: scroll; }
    body { margin: 0; padding: 0; }
    .ds-container {
      width: 100% !important;
      max-width: 1380px !important;
      margin-left: auto !important;
      margin-right: auto !important;
      padding: 2rem 1.5rem 5rem !important;
      box-sizing: border-box !important;
    }
  </style>
</head>
<body>
  <div class="ds-container">
    {% block content %}{% endblock %}
    <footer>
      DAILY SYNC · 본인 전용 다이제스트 · {{ now_year }}
      · <a href="{{ url_for('web.admin') }}">admin</a>
    </footer>
  </div>
  <!-- ===== 로그인 / 회원가입 모달 ===== -->
  <div id="auth-overlay" aria-modal="true" role="dialog"
       style="display:none;position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.65);backdrop-filter:blur(5px);align-items:center;justify-content:center;padding:1rem;">
    <div id="auth-card"
         style="background:var(--bg-card);border:1px solid var(--border);border-radius:18px;padding:2rem;width:min(420px,100%);position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.5);max-height:90vh;overflow-y:auto;animation:authIn .18s ease-out;">
      <button id="auth-close-btn" title="닫기"
              style="position:absolute;top:1rem;right:1rem;width:30px;height:30px;background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s,border-color .15s;font-family:inherit;line-height:1;">✕</button>

      <!-- 로그인 패널 -->
      <div id="auth-login-pane">
        <div class="brand" style="margin-bottom:.25rem;font-size:.95rem;">DAILY <span class="accent">SYNC</span></div>
        <h2 style="font-size:1.2rem;margin:.2rem 0 1.75rem;color:var(--text);font-weight:700;">로그인</h2>
        <div id="auth-login-error" style="display:none;background:#2a1212;color:var(--danger);border:1px solid #5a2020;border-radius:8px;padding:10px 14px;margin-bottom:1.25rem;font-size:13px;"></div>
        <form id="auth-login-form" style="display:flex;flex-direction:column;gap:1.1rem;">
          <input type="hidden" name="next" id="auth-next-input" value="">
          <div>
            <label style="display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600;letter-spacing:.04em;">아이디</label>
            <input class="auth-inp" type="text" name="username" maxlength="14" required autocomplete="username"
                   style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg-soft);color:var(--text);font-family:inherit;font-size:14px;box-sizing:border-box;outline:none;transition:border-color .15s;">
          </div>
          <div>
            <label style="display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600;letter-spacing:.04em;">비밀번호</label>
            <input class="auth-inp" type="password" name="password" maxlength="10" required autocomplete="current-password"
                   style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg-soft);color:var(--text);font-family:inherit;font-size:14px;box-sizing:border-box;outline:none;transition:border-color .15s;">
          </div>
          <button type="submit" style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;letter-spacing:.02em;transition:opacity .15s;">로그인</button>
        </form>
        <div style="text-align:center;margin-top:1.5rem;font-size:13px;color:var(--text-dim);">
          계정이 없으신가요?
          <a href="#" id="goto-register" style="color:var(--accent);text-decoration:none;font-weight:600;">회원가입</a>
        </div>
      </div>

      <!-- 회원가입 패널 -->
      <div id="auth-register-pane" style="display:none;">
        <div class="brand" style="margin-bottom:.25rem;font-size:.95rem;">DAILY <span class="accent">SYNC</span></div>
        <h2 style="font-size:1.2rem;margin:.2rem 0 1.75rem;color:var(--text);font-weight:700;">회원가입</h2>
        <div id="auth-register-error" style="display:none;background:#2a1212;color:var(--danger);border:1px solid #5a2020;border-radius:8px;padding:10px 14px;margin-bottom:1.25rem;font-size:13px;"></div>
        <form id="auth-register-form" style="display:flex;flex-direction:column;gap:1.1rem;">
          <div>
            <label style="display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600;letter-spacing:.04em;">아이디</label>
            <input class="auth-inp" type="text" name="username" id="reg-username" maxlength="14" required autocomplete="username"
                   style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg-soft);color:var(--text);font-family:inherit;font-size:14px;box-sizing:border-box;outline:none;transition:border-color .15s;">
            <div style="font-size:11px;color:var(--text-faint);margin-top:4px;"><span id="reg-ucount">0</span>/14자</div>
          </div>
          <div>
            <label style="display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600;letter-spacing:.04em;">비밀번호</label>
            <input class="auth-inp" type="password" name="password" id="reg-pw" maxlength="10" required autocomplete="new-password"
                   style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg-soft);color:var(--text);font-family:inherit;font-size:14px;box-sizing:border-box;outline:none;transition:border-color .15s;">
            <div style="font-size:11px;color:var(--text-faint);margin-top:4px;"><span id="reg-pwcount">0</span>/10자</div>
          </div>
          <div>
            <label style="display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600;letter-spacing:.04em;">비밀번호 확인</label>
            <input class="auth-inp" type="password" name="password_confirm" id="reg-pw2" maxlength="10" required autocomplete="new-password"
                   style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg-soft);color:var(--text);font-family:inherit;font-size:14px;box-sizing:border-box;outline:none;transition:border-color .15s;">
            <div id="reg-pw-status" style="font-size:11px;color:var(--text-faint);margin-top:4px;">비밀번호를 다시 입력해주세요</div>
          </div>
          <div>
            <label style="display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600;letter-spacing:.04em;">반 선택</label>
            <select name="class_num" id="reg-class" required
                    style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg-soft);color:var(--text);font-family:inherit;font-size:14px;box-sizing:border-box;outline:none;transition:border-color .15s;appearance:none;cursor:pointer;">
              <option value="" disabled selected>반 선택</option>
              <option value="1">1반 AI헬스케어</option>
              <option value="2">2반 AI피지컬</option>
              <option value="3">3반 AI보안</option>
              <option value="4">4반 데이터분석A</option>
              <option value="5">5반 AI금융</option>
              <option value="6">6반 서비스기획</option>
              <option value="7">7반 데이터분석B</option>
            </select>
          </div>
          <div>
            <label style="display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;font-weight:600;letter-spacing:.04em;">이름</label>
            <input class="auth-inp" type="text" name="display_name" id="reg-name" required
                   style="width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;background:var(--bg-soft);color:var(--text);font-family:inherit;font-size:14px;box-sizing:border-box;outline:none;transition:border-color .15s;">
            <div style="font-size:11px;color:var(--text-faint);margin-top:4px;"><span id="reg-ncount">0</span>/<span id="reg-nlimit">14</span>자 · 한글 포함 시 최대 4자</div>
          </div>
          <button type="submit" id="reg-submit-btn" disabled
                  style="background:var(--accent);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;letter-spacing:.02em;opacity:.35;transition:opacity .15s;">가입하기</button>
        </form>
        <div style="text-align:center;margin-top:1.5rem;font-size:13px;color:var(--text-dim);">
          이미 계정이 있으신가요?
          <a href="#" id="goto-login" style="color:var(--accent);text-decoration:none;font-weight:600;">로그인</a>
        </div>
      </div>
    </div>
  </div>

  <style>
    @keyframes authIn {
      from { opacity:0; transform:translateY(-12px) scale(.97); }
      to   { opacity:1; transform:none; }
    }
    #auth-overlay .auth-inp:focus { border-color: var(--accent) !important; }
    #auth-close-btn:hover { background:var(--accent)!important; border-color:var(--accent)!important; color:#fff!important; }
    #reg-submit-btn:not(:disabled):hover { opacity:.88!important; }
    #auth-overlay select { color: var(--text); }
    #auth-overlay select option { background: var(--bg-soft); }

    /* 반 배지 */
    .class-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 36px; height: 36px; border-radius: 50%;
      font-size: 11px; font-weight: 700; color: #fff; flex-shrink: 0;
      line-height: 1;
    }
    .class-badge--1 { background: #4e89ff; }
    .class-badge--2 { background: #57d3a3; }
    .class-badge--3 { background: #ffd166; color: #222; }
    .class-badge--4 { background: #ff6b6b; }
    .class-badge--5 { background: #b57bee; }
    .class-badge--6 { background: #4ecdc4; }
    .class-badge--7 { background: #ff9f43; }
    .class-badge--none { background: var(--bg-soft); color: var(--text-dim); border: 1px solid var(--border); }
  </style>

  <script>
    // ===== 모달 열기/닫기 =====
    const authOverlay  = document.getElementById('auth-overlay');
    const authCard     = document.getElementById('auth-card');
    const loginPane    = document.getElementById('auth-login-pane');
    const registerPane = document.getElementById('auth-register-pane');

    function openAuthModal(pane, next) {
      loginPane.style.display    = pane === 'login'    ? '' : 'none';
      registerPane.style.display = pane === 'register' ? '' : 'none';
      const ni = document.getElementById('auth-next-input');
      if (ni) ni.value = next || '';
      clearAuthErrors();
      authOverlay.style.display = 'flex';
      document.body.style.overflow = 'hidden';
      // 첫 번째 입력 필드에 포커스
      const first = authCard.querySelector('input:not([type=hidden])');
      if (first) setTimeout(() => first.focus(), 50);
    }

    function closeAuthModal() {
      authOverlay.style.display = 'none';
      document.body.style.overflow = '';
    }

    function clearAuthErrors() {
      ['auth-login-error','auth-register-error'].forEach(function(id) {
        const el = document.getElementById(id);
        if (el) { el.style.display = 'none'; el.textContent = ''; }
      });
    }

    document.getElementById('auth-close-btn').addEventListener('click', closeAuthModal);

    // 오버레이 배경 클릭으로 닫기
    authOverlay.addEventListener('click', function(e) {
      if (e.target === authOverlay) closeAuthModal();
    });

    // ESC 키로 닫기
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && authOverlay.style.display === 'flex') closeAuthModal();
    });

    // 패널 전환
    document.getElementById('goto-register').addEventListener('click', function(e) {
      e.preventDefault(); openAuthModal('register');
    });
    document.getElementById('goto-login').addEventListener('click', function(e) {
      e.preventDefault(); openAuthModal('login');
    });

    // ===== 링크 인터셉트 =====
    // 비로그인 상태에서 보호된 페이지(/cluster, /paper, /contest 상세) 또는
    // 로그인·회원가입 링크 클릭 시 모달 표시 (페이지 전환 없음).
    const DS_AUTHED = {{ 'true' if current_user.is_authenticated else 'false' }};
    const PROTECTED_RE = /^\/(cluster|paper|contest)\/\d/;

    document.addEventListener('click', function(e) {
      const a = e.target.closest('a[href]');
      if (!a) return;
      const href = a.getAttribute('href') || '';

      if (href.startsWith('/admin-login') || href === '{{ url_for("web.admin_login") }}') {
        e.preventDefault();
        const next = new URLSearchParams(href.split('?')[1] || '').get('next') || '';
        openAuthModal('login', next);
      } else if (href.startsWith('/admin-register') || href === '{{ url_for("web.admin_register") }}') {
        e.preventDefault();
        openAuthModal('register');
      } else if (!DS_AUTHED && PROTECTED_RE.test(href)) {
        // 비로그인 → 보호된 상세 페이지 클릭 → 로그인 모달 표시
        e.preventDefault();
        openAuthModal('login', href);
      }
    });

    // ===== AJAX 폼 제출 =====
    async function submitAuthForm(formEl, errorElId) {
      const errorEl = document.getElementById(errorElId);
      const btn = formEl.querySelector('[type=submit]');
      btn.disabled = true;
      errorEl.style.display = 'none';
      try {
        const r = await fetch(formEl.action || window.location.href, {
          method: 'POST',
          headers: { 'X-Requested-With': 'fetch' },
          body: new FormData(formEl),
        });
        let data;
        try {
          data = await r.json();
        } catch (_) {
          errorEl.textContent = '서버 오류가 발생했습니다. (' + r.status + ')';
          errorEl.style.display = '';
          btn.disabled = false;
          return;
        }
        if (data.ok) {
          window.location.href = data.redirect || '/';
        } else {
          errorEl.textContent = data.error || '오류가 발생했습니다.';
          errorEl.style.display = '';
          btn.disabled = false;
        }
      } catch (err) {
        errorEl.textContent = '연결 오류: ' + (err.message || '알 수 없는 오류');
        errorEl.style.display = '';
        btn.disabled = false;
      }
    }

    document.getElementById('auth-login-form').action = '{{ url_for("web.admin_login") }}';
    document.getElementById('auth-login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      submitAuthForm(this, 'auth-login-error');
    });

    document.getElementById('auth-register-form').action = '{{ url_for("web.admin_register") }}';
    document.getElementById('auth-register-form').addEventListener('submit', function(e) {
      e.preventDefault();
      submitAuthForm(this, 'auth-register-error');
    });

    // ===== 회원가입 유효성 검사 =====
    (function() {
      const uInput  = document.getElementById('reg-username');
      const pwInput = document.getElementById('reg-pw');
      const pw2     = document.getElementById('reg-pw2');
      const nameIn  = document.getElementById('reg-name');
      const uCount  = document.getElementById('reg-ucount');
      const pwCount = document.getElementById('reg-pwcount');
      const nCount  = document.getElementById('reg-ncount');
      const nLimit  = document.getElementById('reg-nlimit');
      const pwStat  = document.getElementById('reg-pw-status');
      const subBtn  = document.getElementById('reg-submit-btn');
      const KO_RE   = /[가-힣ㄱ-ㅎㅏ-ㅣ]/;

      function checkPw() {
        const a = pwInput.value, b = pw2.value;
        if (!b) {
          pwStat.textContent = '비밀번호를 다시 입력해주세요';
          pwStat.style.color = 'var(--text-faint)';
          pw2.style.borderColor = 'var(--border)';
          subBtn.disabled = true; subBtn.style.opacity = '.35';
          return;
        }
        if (a === b) {
          pwStat.textContent = '✓ 일치'; pwStat.style.color = 'var(--success)';
          pw2.style.borderColor = 'var(--success)';
          subBtn.disabled = false; subBtn.style.opacity = '1';
        } else {
          pwStat.textContent = '✗ 불일치'; pwStat.style.color = 'var(--danger)';
          pw2.style.borderColor = 'var(--danger)';
          subBtn.disabled = true; subBtn.style.opacity = '.35';
        }
      }

      uInput.addEventListener('input', function() { uCount.textContent = this.value.length; });
      pwInput.addEventListener('input', function() {
        pwCount.textContent = this.value.length;
        if (pw2.value) checkPw();
      });
      pw2.addEventListener('input', checkPw);
      nameIn.addEventListener('input', function() {
        const hasKo = KO_RE.test(this.value), lim = hasKo ? 4 : 14;
        if (this.value.length > lim) this.value = this.value.slice(0, lim);
        nCount.textContent = this.value.length;
        nLimit.textContent = lim;
      });
    })();

    // ===== 뒤로가기 복귀 =====
    document.querySelectorAll('a.back-link').forEach(function(a) {
      a.addEventListener('click', function(e) {
        if (history.length > 1) { e.preventDefault(); history.back(); }
      });
    });
  </script>
</body>
</html>
