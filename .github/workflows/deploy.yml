name: Deploy Daily Sync
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync code to server
        run: |
          rsync -az \
            --exclude='.git' \
            --exclude='venv/' \
            --exclude='.venv/' \
            --exclude='hf_cache/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='*.db' \
            --exclude='instance/' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ubuntu@${{ secrets.DEPLOY_HOST }}:~/ai-news-digest/

      - name: Install deps and restart service
        timeout-minutes: 30
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=40 \
              ubuntu@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
          cd ~/ai-news-digest
          # 항상 필요한 경량 패키지
          venv/bin/pip install 'Flask-Login>=0.6.3' 'bcrypt>=3.2.0,<4.0.0' -q
          # sentence-transformers 누락 시에만 설치
          # torch CPU-only 버전 사용 (GPU 버전은 ~2GB로 OOM 유발)
          if ! venv/bin/python -c 'import sentence_transformers' 2>/dev/null; then
            echo "sentence-transformers 설치 중 (CPU-only torch)..."
            venv/bin/pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu -q
            venv/bin/pip install --no-cache-dir 'sentence-transformers>=3.0.0' -q
          fi
          sudo systemctl restart daily-sync
          sleep 3
          sudo systemctl is-active daily-sync
          ENDSSH
