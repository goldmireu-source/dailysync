name: Deploy Daily Sync
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync code to server
        run: |
          rsync -az \
            --exclude='.git' \
            --exclude='venv/' \
            --exclude='.venv/' \
            --exclude='hf_cache/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='*.db' \
            --exclude='*.log' \
            --exclude='*.log.*' \
            --exclude='instance/' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ubuntu@${{ secrets.DEPLOY_HOST }}:~/ai-news-digest/

      - name: Deploy .env to server
        run: |
          printf '%s' "${{ secrets.ENV_FILE }}" | ssh \
            -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.DEPLOY_HOST }} \
            "cat > ~/ai-news-digest/.env && chmod 600 ~/ai-news-digest/.env"

      - name: Install deps and restart service
        timeout-minutes: 10
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=20 \
              ubuntu@${{ secrets.DEPLOY_HOST }} << 'ENDSSH'
          cd ~/ai-news-digest
          # 고아 pip 프로세스 정리 (이전 배포가 중단된 경우)
          pkill -f "pip install" 2>/dev/null || true
          sleep 2
          # 경량 패키지 설치 (torch 불필요)
          venv/bin/pip install \
            'Flask-Login>=0.6.3' \
            'bcrypt>=3.2.0,<4.0.0' \
            'fastembed>=0.3.0' \
            -q
          # DB 마이그레이션 (컬럼/테이블 추가, 멱등성 보장)
          venv/bin/python3 migrate_party.py
          venv/bin/python3 migrate_user_activity.py
          sudo systemctl restart daily-sync
          sleep 3
          sudo systemctl is-active daily-sync
          ENDSSH
