name: Deploy Daily Sync
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync code to server
        run: |
          rsync -az \
            --exclude='.git' \
            --exclude='venv/' \
            --exclude='.venv/' \
            --exclude='hf_cache/' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='*.db' \
            --exclude='instance/' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            ./ ubuntu@${{ secrets.DEPLOY_HOST }}:~/ai-news-digest/

      - name: Install deps and restart service
        timeout-minutes: 30
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=40 \
              ubuntu@${{ secrets.DEPLOY_HOST }} \
            "cd ~/ai-news-digest && \
             venv/bin/pip install -r requirements.txt -q && \
             sudo systemctl restart daily-sync && \
             sleep 3 && \
             sudo systemctl is-active daily-sync"
