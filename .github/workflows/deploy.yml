name: Deploy Daily Sync
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/ai-news-digest
            git fetch origin main
            git reset --hard origin/main
            pkill -f "pip install" 2>/dev/null || true
            sleep 2
            venv/bin/pip install 'Flask-Login>=0.6.3' 'bcrypt>=3.2.0,<4.0.0' -q
            sudo systemctl restart daily-sync
            sleep 3
            sudo systemctl is-active daily-sync
